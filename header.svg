<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="250">
  <defs>
    <style>
      .wave1 { animation: wave 7s linear infinite; }
      .wave2 { animation: wave 11s linear infinite; }
      .wave3 { animation: wave 15s linear infinite; }

      @keyframes wave {
        0% { transform: translateX(0); }
        100% { transform: translateX(-800px); }
      }

      .text-style {
        font-family: 'Courier New', Courier, monospace;
        font-size: 38px;
        font-weight: bold;
        fill: #F4ACB7;
        letter-spacing: 2px;
      }
    </style>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g>
    <path class="wave3" fill="#FFE5D9" opacity="0.7" d="M 0 40 Q 200 80 400 40 T 800 40 T 1200 40 T 1600 40 L 1600 0 L 0 0 Z"/>
    
    <path class="wave2" fill="#FFCAD4" opacity="0.8" d="M 0 60 Q 200 10 400 60 T 800 60 T 1200 60 T 1600 60 L 1600 0 L 0 0 Z"/>
    
    <path class="wave1" fill="#F4ACB7" opacity="0.9" d="M 0 80 Q 200 120 400 80 T 800 80 T 1200 80 T 1600 80 L 1600 0 L 0 0 Z"/>
  </g>

</svg>
